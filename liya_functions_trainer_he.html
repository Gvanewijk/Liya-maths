<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="לייה 📈">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0e17">
<title>מאמן הפונקציות של לייה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17; --surface: #1a1929; --card: #242336;
    --accent1: #ff6b6b; --accent2: #ffd93d; --accent3: #6bcb77;
    --accent4: #4d96ff; --accent5: #c77dff;
    --text: #fffffe; --text-muted: #a7a9be; --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px 48px; direction: rtl;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(77,150,255,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(199,125,255,0.08) 0%, transparent 50%);
  }
  header { text-align: center; margin-bottom: 22px; animation: fadeDown 0.6s ease both; }
  header .emoji { font-size: 2.2rem; }
  header h1 {
    font-size: 1.9rem; font-weight: 900;
    background: linear-gradient(135deg, var(--accent4), var(--accent5));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  header p { color: var(--text-muted); font-size: 0.88rem; margin-top: 3px; }

  .stats-bar { display: flex; gap: 10px; margin-bottom: 14px; animation: fadeDown 0.6s 0.1s ease both; flex-wrap: wrap; justify-content: center; }
  .stat { background: var(--surface); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 8px 16px; text-align: center; min-width: 78px; }
  .stat-value { font-family: 'Space Mono', monospace; font-size: 1.25rem; font-weight: 700; }
  .stat-label { font-size: 0.65rem; color: var(--text-muted); }
  .stat.score .stat-value { color: var(--accent2); }
  .stat.streak .stat-value { color: var(--accent1); }
  .stat.qstat .stat-value { color: var(--accent4); }

  .difficulty-row { display: flex; gap: 6px; margin-bottom: 18px; animation: fadeDown 0.6s 0.15s ease both; flex-wrap: wrap; justify-content: center; }
  .diff-btn {
    padding: 6px 14px; border-radius: 50px; border: 2px solid transparent;
    background: var(--surface); color: var(--text-muted);
    font-family: 'Heebo', sans-serif; font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .diff-btn:hover { color: var(--text); }
  .diff-btn.active[data-diff="easy"]   { border-color: var(--accent3); color: var(--accent3); background: rgba(107,203,119,0.1); }
  .diff-btn.active[data-diff="medium"] { border-color: var(--accent2); color: var(--accent2); background: rgba(255,217,61,0.1); }
  .diff-btn.active[data-diff="hard"]   { border-color: var(--accent1); color: var(--accent1); background: rgba(255,107,107,0.1); }
  .diff-btn.active[data-diff="genius"] { border-color: var(--accent5); color: var(--accent5); background: rgba(199,125,255,0.12); }

  .progress-wrap { width: 100%; max-width: 580px; margin-bottom: 10px; animation: fadeDown 0.6s 0.2s ease both; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 5px; }
  .progress-bar { height: 5px; background: rgba(255,255,255,0.07); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(270deg, var(--accent4), var(--accent5)); border-radius: 10px; transition: width 0.5s ease; }

  .card {
    background: var(--card); border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius);
    padding: 24px; width: 100%; max-width: 580px; margin-bottom: 16px;
    animation: fadeUp 0.4s ease both; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .question-type-badge {
    display: inline-block; font-size: 0.68rem; font-weight: 800;
    padding: 3px 10px; border-radius: 50px; margin-bottom: 11px;
    background: rgba(77,150,255,0.15); color: var(--accent4); border: 1px solid rgba(77,150,255,0.3);
  }
  .badge-genius { background: rgba(199,125,255,0.15) !important; color: var(--accent5) !important; border-color: rgba(199,125,255,0.3) !important; }
  .question-text { font-size: 1.08rem; font-weight: 700; line-height: 1.6; margin-bottom: 8px; white-space: pre-line; }
  .question-formula {
    font-family: 'Space Mono', monospace; font-size: 1.15rem; color: var(--accent4);
    margin: 10px 0; padding: 10px 14px; direction: ltr; text-align: left;
    background: rgba(77,150,255,0.08); border-right: 3px solid var(--accent4); border-radius: 8px;
  }
  .question-sub { color: var(--text-muted); font-size: 0.86rem; margin-bottom: 14px; }

  /* GRAPH */
  .graph-wrap { display: none; justify-content: center; margin: 10px 0 14px; background: rgba(0,0,0,0.25); border-radius: 12px; padding: 6px; border: 1px solid rgba(255,255,255,0.06); }
  .graph-wrap.visible { display: flex; }
  canvas#graph-canvas { border-radius: 8px; max-width: 100%; }

  /* OPTIONS */
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 13px; }
  .option-btn {
    padding: 12px 8px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.08);
    background: var(--surface); color: var(--text);
    font-family: 'Space Mono', monospace; font-size: 0.9rem; cursor: pointer; transition: all 0.18s; font-weight: 700;
    word-break: break-word; line-height: 1.3; direction: ltr;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent4); background: rgba(77,150,255,0.1); transform: translateY(-2px); }
  .option-btn.correct { border-color: var(--accent3); background: rgba(107,203,119,0.15); color: var(--accent3); }
  .option-btn.wrong   { border-color: var(--accent1); background: rgba(255,107,107,0.15); color: var(--accent1); }
  .option-btn:disabled { cursor: default; }

  /* INPUT */
  .input-row { display: flex; gap: 8px; margin-bottom: 13px; flex-direction: row-reverse; }
  .answer-input {
    flex: 1; padding: 12px 13px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1);
    background: var(--surface); color: var(--text);
    font-family: 'Space Mono', monospace; font-size: 1rem; outline: none; transition: border-color 0.2s;
    direction: ltr; text-align: center;
  }
  .answer-input:focus { border-color: var(--accent4); }
  .answer-input.correct { border-color: var(--accent3); }
  .answer-input.wrong   { border-color: var(--accent1); }
  .submit-btn {
    padding: 12px 18px; border-radius: 12px; border: none; background: var(--accent4);
    color: white; font-family: 'Heebo', sans-serif; font-size: 0.9rem; font-weight: 800; cursor: pointer; transition: all 0.18s;
  }
  .submit-btn:hover { filter: brightness(1.15); transform: translateY(-2px); }

  /* DUAL INPUT */
  .dual-input-row { display: flex; gap: 7px; margin-bottom: 13px; align-items: center; flex-wrap: wrap; justify-content: center; direction: ltr; }
  .dual-label { font-family: 'Space Mono', monospace; font-size: 0.88rem; color: var(--text-muted); white-space: nowrap; }
  .dual-input {
    width: 68px; padding: 10px 8px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.1);
    background: var(--surface); color: var(--text);
    font-family: 'Space Mono', monospace; font-size: 0.95rem; outline: none; text-align: center; transition: border-color 0.2s;
  }
  .dual-input:focus { border-color: var(--accent5); }
  .dual-input.correct { border-color: var(--accent3); }
  .dual-input.wrong   { border-color: var(--accent1); }
  .dual-submit {
    padding: 10px 16px; border-radius: 10px; border: none; background: var(--accent5);
    color: white; font-family: 'Heebo', sans-serif; font-size: 0.88rem; font-weight: 800; cursor: pointer; transition: all 0.18s;
  }
  .dual-submit:hover { filter: brightness(1.1); transform: translateY(-2px); }

  .feedback { min-height: 32px; font-size: 0.92rem; font-weight: 700; text-align: center; padding: 7px; border-radius: 10px; margin-bottom: 3px; transition: all 0.3s; }
  .feedback.correct { color: var(--accent3); background: rgba(107,203,119,0.1); }
  .feedback.wrong   { color: var(--accent1); background: rgba(255,107,107,0.1); }

  .next-btn {
    width: 100%; padding: 12px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--accent5), var(--accent4));
    color: white; font-family: 'Heebo', sans-serif; font-size: 0.92rem; font-weight: 800;
    cursor: pointer; transition: all 0.2s; display: none; margin-top: 10px;
  }
  .next-btn.visible { display: block; animation: fadeUp 0.3s ease both; }
  .next-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

  .hint-toggle { background: none; border: none; color: var(--text-muted); font-family: 'Heebo', sans-serif; font-size: 0.78rem; cursor: pointer; text-decoration: underline; margin-top: 7px; display: inline-block; }
  .hint-toggle:hover { color: var(--accent4); }
  .hint-area { margin-top: 7px; font-size: 0.81rem; color: var(--text-muted); line-height: 1.7; padding: 9px 12px; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); display: none; white-space: pre-line; direction: rtl; }
  .hint-area.visible { display: block; animation: fadeUp 0.3s ease both; }

  /* CELEBRATION */
  .celebration {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(15,14,23,0.96); z-index: 100; animation: fadeUp 0.4s ease both; padding: 24px; text-align: center;
  }
  .celebration h2 { font-size: 2rem; font-weight: 900; background: linear-gradient(135deg, var(--accent2), var(--accent5)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
  .celebration p { color: var(--text-muted); font-size: 0.97rem; margin-bottom: 5px; }
  .big-score { font-family: 'Space Mono', monospace; font-size: 3.2rem; font-weight: 700; color: var(--accent2); margin-bottom: 6px; }
  .restart-btn { padding: 13px 30px; border-radius: 50px; border: none; background: linear-gradient(135deg, var(--accent4), var(--accent5)); color: white; font-family: 'Heebo', sans-serif; font-size: 0.97rem; font-weight: 800; cursor: pointer; transition: all 0.2s; margin-top: 14px; }
  .restart-btn:hover { filter: brightness(1.1); transform: scale(1.04); }
  .confetti-emoji { font-size: 2.6rem; margin-bottom: 8px; animation: pop 0.6s ease infinite alternate; }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:translateY(0); } }
  @keyframes pop { 0%{transform:scale(1);} 50%{transform:scale(1.15);} 100%{transform:scale(1);} }
  .pop { animation: pop 0.3s ease; }

  /* ── MOBILE / iPHONE ── */
  @media (max-width: 600px) {
    body {
      padding: 16px 12px env(safe-area-inset-bottom, 24px);
      padding-top: max(16px, env(safe-area-inset-top, 16px));
      -webkit-tap-highlight-color: transparent;
    }
    header h1 { font-size: 1.5rem; }
    header p  { font-size: 0.8rem; }
    .stat { min-width: 68px; padding: 7px 10px; }
    .stat-value { font-size: 1.1rem; }
    .diff-btn { padding: 7px 11px; font-size: 0.78rem; }
    .card { padding: 18px 16px; border-radius: 14px; }
    .question-text { font-size: 1rem; }
    .question-formula { font-size: 1rem; padding: 9px 12px; }
    .options-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .option-btn {
      padding: 16px 8px; font-size: 0.88rem;
      min-height: 54px; /* large touch target */
    }
    .option-btn:hover:not(:disabled) { transform: none; } /* no hover effects on touch */
    .answer-input { font-size: 1.1rem; padding: 14px 12px; }
    .submit-btn { padding: 14px 16px; font-size: 0.9rem; min-height: 54px; }
    .dual-input { width: 58px; padding: 12px 6px; font-size: 0.9rem; }
    .dual-submit { padding: 12px 14px; min-height: 54px; }
    .next-btn { padding: 15px; font-size: 0.95rem; min-height: 54px; }
    .hint-toggle { font-size: 0.82rem; padding: 4px 0; }
    canvas#graph-canvas { width: 100%; height: auto; }
    .celebration { padding: 32px 20px; }
    .celebration h2 { font-size: 1.7rem; }
    .big-score { font-size: 2.8rem; }
    .restart-btn { padding: 15px 28px; min-height: 54px; }
  }

  /* prevent double-tap zoom on buttons */
  button, input { touch-action: manipulation; }
</style>
</head>
<body>

<header>
  <div class="emoji">📈</div>
  <h1>מאמן הפונקציות של לייה</h1>
  <p>כיתה ח׳ · פונקציות לינאריות · בואי נעלה רמה!</p>
</header>

<div class="stats-bar">
  <div class="stat score"><div class="stat-value" id="score">0</div><div class="stat-label">ניקוד</div></div>
  <div class="stat streak"><div class="stat-value" id="streak">0</div><div class="stat-label">רצף</div></div>
  <div class="stat qstat"><div class="stat-value" id="qnum">1/10</div><div class="stat-label">שאלה</div></div>
</div>

<div class="difficulty-row">
  <button class="diff-btn active" data-diff="easy"   onclick="setDifficulty('easy')">קל</button>
  <button class="diff-btn"        data-diff="medium" onclick="setDifficulty('medium')">בינוני</button>
  <button class="diff-btn"        data-diff="hard"   onclick="setDifficulty('hard')">קשה</button>
  <button class="diff-btn"        data-diff="genius" onclick="setDifficulty('genius')">🧠 גאון</button>
</div>

<div class="progress-wrap">
  <div class="progress-label"><span>התקדמות</span><span id="progress-pct">0%</span></div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<div class="card" id="question-card">
  <div class="question-type-badge" id="q-type-badge">חישוב</div>
  <div class="question-text" id="q-text">טוען...</div>
  <div class="question-formula" id="q-formula" style="display:none"></div>
  <div class="question-sub" id="q-sub"></div>

  <div class="graph-wrap" id="graph-wrap">
    <canvas id="graph-canvas" width="360" height="260"></canvas>
  </div>

  <div class="options-grid" id="options-grid" style="display:none"></div>
  <div class="input-row" id="input-row" style="display:none">
    <input class="answer-input" id="answer-input" type="text" placeholder="התשובה שלך..." autocomplete="off"/>
    <button class="submit-btn" onclick="checkInput()">בדיקה</button>
  </div>
  <div class="dual-input-row" id="dual-input-row" style="display:none">
    <span class="dual-label">f(x) =</span>
    <input class="dual-input" id="dual-m" type="text" placeholder="m" autocomplete="off"/>
    <span class="dual-label">· x +</span>
    <input class="dual-input" id="dual-b" type="text" placeholder="b" autocomplete="off"/>
    <button class="dual-submit" onclick="checkDual()">בדיקה</button>
  </div>

  <div class="feedback" id="feedback"></div>
  <button class="hint-toggle" id="hint-toggle" onclick="toggleHint()" style="display:none">💡 הצג רמז</button>
  <div class="hint-area" id="hint-area"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">← שאלה הבאה</button>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────
let difficulty = 'easy';
let score = 0, streak = 0, questionIndex = 0;
const TOTAL_QUESTIONS = 10;
let currentQuestion = null, answered = false;

// ── HELPERS ────────────────────────────────────────────────
const randInt = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const randNZ  = (a,b) => { let v; do { v=randInt(a,b); } while(v===0); return v; };
const shuffle = arr => [...arr].sort(()=>Math.random()-0.5);

function formatLinear(m,b) {
  let s = 'f(x) = ';
  s += (m===1?'':m===-1?'-':m)+'x';
  if (b>0) s += ' + '+b;
  else if (b<0) s += ' − '+Math.abs(b);
  return s;
}

function wrongNums(correct, count=3) {
  const seen=new Set([correct]); const opts=[]; let d=1;
  while(opts.length<count) {
    if(!seen.has(correct+d)){seen.add(correct+d);opts.push(correct+d);}
    if(!seen.has(correct-d)){seen.add(correct-d);opts.push(correct-d);}
    d++;
  }
  return shuffle(opts).slice(0,count);
}

// ── GRAPH DRAWING ──────────────────────────────────────────
function drawGraph(m, b, points=[]) {
  const cv=document.getElementById('graph-canvas');
  const ctx=cv.getContext('2d');
  const W=cv.width, H=cv.height, cx=W/2, cy=H/2, sc=24;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#12111f'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
  for(let x=-8;x<=8;x++){ctx.beginPath();ctx.moveTo(cx+x*sc,0);ctx.lineTo(cx+x*sc,H);ctx.stroke();}
  for(let y=-6;y<=6;y++){ctx.beginPath();ctx.moveTo(0,cy+y*sc);ctx.lineTo(W,cy+y*sc);ctx.stroke();}
  ctx.strokeStyle='rgba(255,255,255,0.28)'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.28)'; ctx.font='10px Space Mono,monospace';
  ctx.textAlign='center';
  for(let x=-6;x<=6;x+=2){if(x===0)continue;ctx.fillText(x,cx+x*sc,cy+13);}
  ctx.textAlign='right';
  for(let y=-4;y<=4;y+=2){if(y===0)continue;ctx.fillText(-y,cx-5,cy+y*sc+4);}
  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='bold 12px Heebo,sans-serif';
  ctx.textAlign='center'; ctx.fillText('x',W-8,cy-8);
  ctx.fillText('y',cx+10,12);
  ctx.strokeStyle='#4d96ff'; ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(cx+(-8)*sc,cy-(m*(-8)+b)*sc);
  ctx.lineTo(cx+(8)*sc, cy-(m*(8)+b)*sc);
  ctx.stroke();
  points.forEach(([px,py])=>{
    ctx.fillStyle='#ffd93d';
    ctx.beginPath();ctx.arc(cx+px*sc,cy-py*sc,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,217,61,0.85)'; ctx.font='10px Space Mono,monospace'; ctx.textAlign='left';
    ctx.fillText('('+px+','+py+')',cx+px*sc+7,cy-py*sc-5);
  });
}

function drawTwoLines(m1,b1,m2,b2) {
  const cv=document.getElementById('graph-canvas');
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,cx=W/2,cy=H/2,sc=24;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#12111f'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
  for(let x=-8;x<=8;x++){ctx.beginPath();ctx.moveTo(cx+x*sc,0);ctx.lineTo(cx+x*sc,H);ctx.stroke();}
  for(let y=-6;y<=6;y++){ctx.beginPath();ctx.moveTo(0,cy+y*sc);ctx.lineTo(W,cy+y*sc);ctx.stroke();}
  ctx.strokeStyle='rgba(255,255,255,0.28)'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();
  [[m1,b1,'#4d96ff','f(x)'],[m2,b2,'#ff6b6b','g(x)']].forEach(([m,b,color,lbl])=>{
    ctx.strokeStyle=color; ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(cx+(-8)*sc,cy-(m*(-8)+b)*sc);ctx.lineTo(cx+(8)*sc,cy-(m*(8)+b)*sc);ctx.stroke();
    ctx.fillStyle=color; ctx.font='bold 11px Heebo,sans-serif'; ctx.textAlign='left';
    const ex=5, ey=m*ex+b;
    ctx.fillText(lbl,cx+ex*sc+4,cy-ey*sc-6);
  });
}

// ── QUESTION TYPES ─────────────────────────────────────────

function qCalculate(){
  let m,b,x;
  if(difficulty==='easy'){m=randNZ(1,4);b=randInt(0,5);x=randInt(1,5);}
  else if(difficulty==='medium'){m=randNZ(-4,4);b=randInt(-5,5);x=randInt(-3,6);}
  else{m=randNZ(-6,6);b=randInt(-8,8);x=randInt(-5,8);}
  const ans=m*x+b;
  return { type:'multiple', badge:'חישוב f(x)', graph:false,
    text:`מהו f(${x})?`, formula:formatLinear(m,b), sub:'',
    answer:String(ans), options:shuffle([String(ans),...wrongNums(ans).map(String)]),
    hint:`הצב x = ${x} בפונקציה:\nf(${x}) = ${m===1?'':m===-1?'-':m}·${x} + (${b}) = ${m*x} + ${b} = ${ans}`};
}

function qFindSlope(){
  let m,b;
  if(difficulty==='easy'){m=randNZ(1,5);b=randInt(0,4);}
  else{m=randNZ(-6,6);b=randInt(-5,5);}
  return { type:'multiple', badge:'מציאת שיפוע', graph:false,
    text:'מהו השיפוע (m) של הפונקציה?', formula:formatLinear(m,b), sub:'',
    answer:String(m), options:shuffle([String(m),...wrongNums(m).map(String)]),
    hint:`בפונקציה f(x) = mx + b, השיפוע הוא המקדם של x.\nכאן m = ${m}.`};
}

function qFindIntercept(){
  let m,b;
  if(difficulty==='easy'){m=randNZ(1,4);b=randInt(1,6);}
  else{m=randNZ(-5,5);b=randInt(-6,6);}
  return { type:'multiple', badge:'נקודת חיתוך עם ציר y', graph:false,
    text:'מהי נקודת החיתוך עם ציר y (b) של הפונקציה?', formula:formatLinear(m,b),
    sub:'נקודת החיתוך עם ציר y היא הערך של f(0).',
    answer:String(b), options:shuffle([String(b),...wrongNums(b).map(String)]),
    hint:`הצב x = 0: f(0) = m·0 + b = b.\nנקודת החיתוך עם ציר y היא הקבוע: ${b}`};
}

function qIncDec(){
  let m=randNZ(-5,5),b=randInt(-4,4);
  if(difficulty==='easy'&&m<0)m=-m;
  const correct=m>0?'עולה':'יורדת';
  return { type:'multiple', badge:'עולה או יורדת?', graph:false,
    text:'האם הפונקציה עולה או יורדת?', formula:formatLinear(m,b), sub:'',
    answer:correct, options:['עולה','יורדת'],
    hint:`אם שיפוע m > 0 → הפונקציה עולה.\nאם שיפוע m < 0 → הפונקציה יורדת.\nכאן m = ${m}.`};
}

function qFindX(){
  let m=randNZ(-5,5),b=randInt(-6,6);
  const x0=randInt(difficulty==='easy'?1:-4,6);
  const fxVal=m*x0+b;
  return { type:'input', badge:'מציאת x', graph:false,
    text:`אם f(x) = ${fxVal}, מהו x?`, formula:formatLinear(m,b),
    sub:'פתרו את המשוואה עבור x.', answer:String(x0),
    hint:`השוו את הפונקציה ל־${fxVal}:\n${m}x + ${b} = ${fxVal}\n${m}x = ${fxVal-b}\nx = ${fxVal-b} ÷ ${m} = ${x0}`};
}

function qSlopeFromPoints(){
  const x1=randInt(-4,2),dx=randNZ(1,4),x2=x1+dx;
  const m=randNZ(-5,5),b=randInt(-5,5);
  const y1=m*x1+b,y2=m*x2+b;
  return { type:'multiple', badge:'שיפוע מנקודות', graph:false,
    text:`קו עובר דרך הנקודות (${x1}, ${y1}) ו־(${x2}, ${y2}).\nמהו השיפוע?`,
    formula:'', sub:'השתמשו בנוסחה: m = (y₂ − y₁) / (x₂ − x₁)',
    answer:String(m), options:shuffle([String(m),...wrongNums(m).map(String)]),
    hint:`m = (${y2} − ${y1}) / (${x2} − ${x1}) = ${y2-y1} / ${x2-x1} = ${m}`};
}

// GRAPH QUESTIONS
function qReadSlopeFromGraph(){
  const m=randNZ(difficulty==='easy'?-3:-5,difficulty==='easy'?3:5);
  const b=randInt(-4,4);
  return { type:'multiple', badge:'קריאת גרף', graph:true, graphM:m, graphB:b,
    text:'מהו השיפוע של הקו המוצג בגרף?', formula:'', sub:'',
    answer:String(m), options:shuffle([String(m),...wrongNums(m).map(String)]),
    hint:`בחרו שתי נקודות ברורות על הקו.\nשיפוע = עלייה ÷ ריצה = Δy ÷ Δx`};
}

function qReadInterceptFromGraph(){
  const m=randNZ(-4,4),b=randInt(-4,4);
  return { type:'multiple', badge:'קריאת גרף', graph:true, graphM:m, graphB:b,
    text:'מהי נקודת החיתוך עם ציר y של הקו המוצג?', formula:'', sub:'',
    answer:String(b), options:shuffle([String(b),...wrongNums(b).map(String)]),
    hint:`נקודת החיתוך עם ציר y היא המקום שבו הקו חוצה את ציר y (x = 0).\nחפשו את הנקודה (0, ?) בגרף.`};
}

function qMatchEquation(){
  const m=randNZ(-4,4),b=randInt(-4,4);
  const correct=formatLinear(m,b);
  const wrongs=[];
  const deltas=shuffle([[1,0],[-1,0],[0,1],[0,-1],[2,0],[0,-2]]);
  for(const [dm,db] of deltas){
    if(wrongs.length>=3)break;
    const wm=m+dm,wb=b+db;
    if(wm===0)continue;
    wrongs.push(formatLinear(wm,wb));
  }
  return { type:'multiple', badge:'התאמה לגרף', graph:true, graphM:m, graphB:b,
    text:'איזו משוואה מתאימה לגרף?', formula:'', sub:'',
    answer:correct, options:shuffle([correct,...wrongs]),
    hint:`בדקו נקודת חיתוך עם ציר y (איפה הקו חוצה את ציר y) → b = ${b}\nבדקו שיפוע (עלייה/ריצה) → m = ${m}`};
}

// GENIUS QUESTIONS
function qEquationFromPoints(){
  const x1=randInt(-4,1),dx=randNZ(1,4),x2=x1+dx;
  const m=randNZ(-4,4),b=randInt(-5,5);
  const y1=m*x1+b,y2=m*x2+b;
  return { type:'dual', badge:'מציאת המשוואה', graph:true, graphM:m, graphB:b,
    graphPoints:[[x1,y1],[x2,y2]],
    text:`הקו עובר דרך הנקודות (${x1}, ${y1}) ו־(${x2}, ${y2}).\nמצאו את f(x) = mx + b.`,
    formula:'', sub:'הזינו את השיפוע (m) ואת נקודת החיתוך עם ציר y (b).',
    answerM:String(m), answerB:String(b),
    hint:`שלב 1 – שיפוע: m = (${y2}−${y1})/(${x2}−${x1}) = ${y2-y1}/${x2-x1} = ${m}\nשלב 2 – נקודת חיתוך: השתמשו בנקודה (${x1},${y1}):\n${y1} = ${m}·${x1} + b → b = ${b}`};
}

function qIntersection(){
  const m1=randNZ(-3,3),m2=randNZ(-3,3);
  if(m1===m2)return qEquationFromPoints();
  const xi=randInt(-3,3),yi=randInt(-3,3);
  const b1=yi-m1*xi,b2=yi-m2*xi;
  return { type:'input', badge:'נקודת חיתוך', graph:true, graphType:'two',
    graphM1:m1,graphB1:b1,graphM2:m2,graphB2:b2,
    text:`באיזה ערך x נחתכים שני הקווים?\nf(x) = ${formatLinear(m1,b1).replace('f(x) = ','')}\ng(x) = ${formatLinear(m2,b2).replace('f(x) = ','')}`,
    formula:'', sub:'השוו את שתי הפונקציות ופתרו עבור x.',
    answer:String(xi),
    hint:`השוו:\n${m1}x + ${b1} = ${m2}x + ${b2}\n${m1-m2}x = ${b2-b1}\nx = ${b2-b1} / ${m1-m2} = ${xi}`};
}

function qReadFullEquation(){
  const m=randNZ(-4,4),b=randInt(-4,4);
  return { type:'dual', badge:'קריאת משוואה מגרף', graph:true, graphM:m, graphB:b,
    text:'זהו את המשוואה המלאה של הקו.\nהזינו m (שיפוע) ו־b (נקודת חיתוך עם ציר y).',
    formula:'', sub:'f(x) = mx + b',
    answerM:String(m), answerB:String(b),
    hint:`נקודת חיתוך עם ציר y: היכן חוצה הקו את ציר y? → b = ${b}\nשיפוע: בחרו שתי נקודות, חשבו עלייה/ריצה → m = ${m}`};
}

const wordProblems=[
  ()=>{const base=randInt(8,25),rate=randNZ(3,9),x=randInt(2,6),ans=base+rate*x;
    return{type:'input',badge:'בעיה מילולית',graph:false,
      text:`מונית גובה ${base}₪ כדמי פתיחה, ועוד ${rate}₪ לק"מ.\nכמה עולה נסיעה של ${x} ק"מ?`,
      formula:`f(x) = ${rate}x + ${base}`,sub:'',answer:String(ans),
      hint:`f(${x}) = ${rate}·${x} + ${base} = ${rate*x} + ${base} = ${ans}`};},
  ()=>{const start=randInt(60,95),drain=randNZ(8,18),x=randInt(2,4),ans=start-drain*x;
    return{type:'input',badge:'בעיה מילולית',graph:false,
      text:`הסוללה של הטלפון עומדת על ${start}% ומתרוקנת ב־${drain}% לשעה.\nכמה אחוז נשאר אחרי ${x} שעות?`,
      formula:`f(x) = ${-drain}x + ${start}`,sub:'',answer:String(ans),
      hint:`f(${x}) = ${-drain}·${x} + ${start} = ${-drain*x}+${start} = ${ans}`};},
  ()=>{const price=randInt(50,120),cut=randNZ(5,12),x=randInt(2,5),ans=price-cut*x;
    return{type:'input',badge:'בעיה מילולית',graph:false,
      text:`חנות מוזילה מוצר ב־${cut}₪ כל שבוע. המחיר ההתחלתי הוא ${price}₪.\nמה המחיר אחרי ${x} שבועות?`,
      formula:`f(x) = ${-cut}x + ${price}`,sub:'',answer:String(ans),
      hint:`f(${x}) = ${-cut}·${x} + ${price} = ${-cut*x}+${price} = ${ans}`};},
  ()=>{const m=randInt(2,6),b=randInt(5,20),mult=randInt(3,7),target=m*mult+b;
    return{type:'input',badge:'בעיה מילולית',graph:false,
      text:`צמח גדל ${m} ס"מ בשבוע וגובהו הנוכחי הוא ${b} ס"מ.\nאחרי כמה שבועות יגיע לגובה ${target} ס"מ?`,
      formula:`f(x) = ${m}x + ${b}`,sub:'פתרו עבור x.',answer:String(mult),
      hint:`${m}x + ${b} = ${target}\n${m}x = ${target-b}\nx = ${target-b}/${m} = ${mult}`};}
];
function qWordProblem(){return wordProblems[randInt(0,wordProblems.length-1)]();}

// ── QUESTION POOLS ─────────────────────────────────────────
function getQuestion(){
  const pools={
    easy:  [qCalculate,qFindSlope,qFindIntercept,qIncDec,qReadSlopeFromGraph,qReadInterceptFromGraph],
    medium:[qCalculate,qFindSlope,qFindIntercept,qIncDec,qFindX,qReadSlopeFromGraph,qReadInterceptFromGraph,qMatchEquation],
    hard:  [qCalculate,qFindSlope,qFindIntercept,qFindX,qSlopeFromPoints,qReadSlopeFromGraph,qReadInterceptFromGraph,qMatchEquation],
    genius:[qFindX,qSlopeFromPoints,qEquationFromPoints,qIntersection,qWordProblem,qReadFullEquation,qMatchEquation]
  };
  const pool=pools[difficulty];
  return pool[randInt(0,pool.length-1)]();
}

// ── RENDER ─────────────────────────────────────────────────
function renderQuestion(){
  answered=false;
  currentQuestion=getQuestion();
  const q=currentQuestion;

  const badge=document.getElementById('q-type-badge');
  badge.textContent=q.badge;
  badge.className='question-type-badge'+(difficulty==='genius'?' badge-genius':'');

  document.getElementById('q-text').textContent=q.text;
  const fEl=document.getElementById('q-formula');
  if(q.formula){fEl.textContent=q.formula;fEl.style.display='block';}else{fEl.style.display='none';}
  document.getElementById('q-sub').textContent=q.sub||'';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').className='next-btn';
  document.getElementById('hint-area').className='hint-area';
  document.getElementById('hint-area').textContent='';
  const ht=document.getElementById('hint-toggle');
  ht.style.display=q.hint?'inline-block':'none';
  ht.textContent='💡 הצג רמז';

  const gw=document.getElementById('graph-wrap');
  if(q.graph){
    gw.className='graph-wrap visible';
    if(q.graphType==='two') drawTwoLines(q.graphM1,q.graphB1,q.graphM2,q.graphB2);
    else drawGraph(q.graphM,q.graphB,q.graphPoints||[]);
  } else { gw.className='graph-wrap'; }

  document.getElementById('options-grid').style.display='none';
  document.getElementById('input-row').style.display='none';
  document.getElementById('dual-input-row').style.display='none';

  if(q.type==='multiple'){
    const og=document.getElementById('options-grid');
    og.style.display='grid'; og.innerHTML='';
    q.options.forEach(opt=>{
      const btn=document.createElement('button');
      btn.className='option-btn'; btn.textContent=opt;
      btn.onclick=()=>checkOption(btn,opt);
      og.appendChild(btn);
    });
  } else if(q.type==='input'){
    document.getElementById('input-row').style.display='flex';
    const inp=document.getElementById('answer-input');
    inp.value='';inp.className='answer-input';inp.disabled=false;inp.focus();
    inp.onkeydown=e=>{if(e.key==='Enter')checkInput();};
  } else if(q.type==='dual'){
    document.getElementById('dual-input-row').style.display='flex';
    const dm=document.getElementById('dual-m'),db=document.getElementById('dual-b');
    dm.value='';db.value='';dm.className='dual-input';db.className='dual-input';
    dm.disabled=false;db.disabled=false;dm.focus();
    [dm,db].forEach(el=>{el.onkeydown=e=>{if(e.key==='Enter')checkDual();};});
  }

  const pct=Math.round((questionIndex/TOTAL_QUESTIONS)*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
  document.getElementById('qnum').textContent=`${questionIndex+1}/${TOTAL_QUESTIONS}`;
}

// ── CHECK ──────────────────────────────────────────────────
function checkOption(btn,chosen){
  if(answered)return; answered=true;
  const correct=chosen===currentQuestion.answer;
  document.querySelectorAll('.option-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===currentQuestion.answer)b.classList.add('correct');
  });
  if(!correct)btn.classList.add('wrong');
  showFeedback(correct);
}

function checkInput(){
  if(answered)return;
  const inp=document.getElementById('answer-input');
  const val=inp.value.trim(); if(!val)return;
  answered=true; inp.disabled=true;
  const correct=val===currentQuestion.answer;
  inp.classList.add(correct?'correct':'wrong');
  showFeedback(correct,!correct?`התשובה הנכונה היא ${currentQuestion.answer}`:null);
}

function checkDual(){
  if(answered)return;
  const dm=document.getElementById('dual-m'),db=document.getElementById('dual-b');
  if(!dm.value.trim()||!db.value.trim())return;
  answered=true; dm.disabled=true; db.disabled=true;
  const cm=dm.value.trim()===currentQuestion.answerM;
  const cb=db.value.trim()===currentQuestion.answerB;
  dm.classList.add(cm?'correct':'wrong');
  db.classList.add(cb?'correct':'wrong');
  showFeedback(cm&&cb,!(cm&&cb)?`m = ${currentQuestion.answerM}, b = ${currentQuestion.answerB}`:null);
}

function showFeedback(correct,customMsg=null){
  const fb=document.getElementById('feedback');
  const pts={easy:10,medium:20,hard:30,genius:50}[difficulty];
  if(correct){
    const bonus=streak>=2?10:0;
    score+=pts+bonus; streak++;
    fb.textContent=streak>=3?`🔥 רצף מדהים! +${pts+bonus} נקודות`:`✅ נכון! +${pts} נקודות`;
    fb.className='feedback correct';
  } else {
    streak=0;
    fb.textContent=customMsg?`❌ ${customMsg}`:`❌ לא מדויק. התשובה: ${currentQuestion.answer}`;
    fb.className='feedback wrong';
  }
  document.getElementById('score').textContent=score;
  document.getElementById('score').classList.add('pop');
  setTimeout(()=>document.getElementById('score').classList.remove('pop'),300);
  document.getElementById('streak').textContent=streak+(streak>=2?'🔥':'');
  document.getElementById('next-btn').className='next-btn visible';
}

// ── NAVIGATION ─────────────────────────────────────────────
function nextQuestion(){
  questionIndex++;
  if(questionIndex>=TOTAL_QUESTIONS)showCelebration();
  else renderQuestion();
}

function showCelebration(){
  const maxPts={easy:10,medium:20,hard:30,genius:50}[difficulty]*TOTAL_QUESTIONS+100;
  const pct=Math.round((score/maxPts)*100);
  let emoji='⭐',msg='כל הכבוד על המאמץ! בואי נמשיך להתאמן!';
  if(difficulty==='genius'&&pct>=80){emoji='🧠✨';msg='רמת גאון הושלמה! את פשוט מדהימה!';}
  else if(pct>=90){emoji='🏆';msg='מצוין! את אלופת הפונקציות, לייה!';}
  else if(pct>=70){emoji='🎉';msg='עבודה נהדרת, לייה! כמעט מושלם!';}
  else if(pct>=50){emoji='👍';msg='יפה מאוד! עוד קצת תרגול ותשלימי!';}
  const levelNames={easy:'קל',medium:'בינוני',hard:'קשה',genius:'גאון'};
  const cel=document.createElement('div');
  cel.className='celebration';
  cel.innerHTML=`
    <div class="confetti-emoji">${emoji}</div>
    <h2>סיום סבב!</h2>
    <div class="big-score">${score}</div>
    <p>${msg}</p>
    <p style="color:var(--text-muted);font-size:0.8rem;margin-top:4px">רמה: <strong style="color:var(--accent2)">${levelNames[difficulty]}</strong></p>
    <button class="restart-btn" onclick="restartGame()">שחקי שוב 🔄</button>
  `;
  document.body.appendChild(cel);
}

function restartGame(){
  score=0;streak=0;questionIndex=0;
  document.getElementById('score').textContent='0';
  document.getElementById('streak').textContent='0';
  const cel=document.querySelector('.celebration');
  if(cel)cel.remove();
  renderQuestion();
}

function setDifficulty(d){
  difficulty=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('active',b.dataset.diff===d));
  score=0;streak=0;questionIndex=0;
  document.getElementById('score').textContent='0';
  document.getElementById('streak').textContent='0';
  renderQuestion();
}

function toggleHint(){
  const area=document.getElementById('hint-area'),toggle=document.getElementById('hint-toggle');
  if(area.classList.contains('visible')){area.classList.remove('visible');toggle.textContent='💡 הצג רמז';}
  else{area.textContent=currentQuestion.hint;area.classList.add('visible');toggle.textContent='🙈 הסתר רמז';}
}

renderQuestion();
</script>
